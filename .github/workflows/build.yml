name: Build RootFS

on:
  workflow_dispatch:
    inputs:
      arch:
        description: CPU architecture
        type: choice
        options: [amd64, arm64]
        default: amd64
      alpine_version:
        description: Alpine version/tag
        default: '3.21'
      extra_mb:
        description: Extra MiB added to the ext4 artifact before first-boot resize
        default: '8'
  pull_request:
    paths:
      - '**'
  push:
    branches: [main]
    paths:
      - '**'

jobs:
  build-alpine-nginx:
    name: Build Alpine nginx rootfs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install rootfs tools
        run: sudo apt-get update && sudo apt-get install -y e2fsprogs

      - name: Enable Docker CPU emulation
        uses: docker/setup-qemu-action@v3

      - name: Build rootfs
        env:
          ARCH: ${{ inputs.arch || 'amd64' }}
          ALPINE_VERSION: ${{ inputs.alpine_version || '3.21' }}
          EXTRA_MB: ${{ inputs.extra_mb || '8' }}
        run: ./build.sh

      - name: Summarize artifacts
        run: |
          {
            echo "## RootFS artifacts"
            echo
            echo "GitHub downloads artifacts as zip files. Unzip the artifact, then upload the \`.ext4\` file to LatticeVE."
            echo
            echo '```text'
            find dist -maxdepth 1 -type f -printf '%f\n' | sort
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-nginx-${{ inputs.alpine_version || '3.21' }}-${{ inputs.arch || 'amd64' }}-ext4
          path: |
            dist/*.ext4
            dist/*.sha256
            dist/*.json
          retention-days: 14
