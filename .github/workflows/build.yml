name: Build RootFS

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      arch:
        description: CPU architecture
        type: choice
        options: [amd64, arm64]
        default: amd64
      alpine_version:
        description: Alpine version/tag
        default: '3.21'
      extra_mb:
        description: Extra MiB added to the ext4 artifact before first-boot resize
        default: '8'
  pull_request:
    paths:
      - '**'
  push:
    branches: [main]
    paths:
      - '**'

jobs:
  build-alpine-nginx:
    name: Build Alpine nginx rootfs
    runs-on: ubuntu-latest
    env:
      ARCH: ${{ inputs.arch || 'amd64' }}
      ALPINE_VERSION: ${{ inputs.alpine_version || '3.21' }}
      EXTRA_MB: ${{ inputs.extra_mb || '8' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install rootfs tools
        run: sudo apt-get update && sudo apt-get install -y e2fsprogs

      - name: Enable Docker CPU emulation
        uses: docker/setup-qemu-action@v3

      - name: Build rootfs
        run: ./build.sh

      - name: Summarize artifacts
        run: |
          {
            echo "## RootFS artifacts"
            echo
            echo "Manual workflow runs publish these files as raw GitHub Release assets."
            echo
            echo '```text'
            find dist -maxdepth 1 -type f -printf '%f\n' | sort
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish raw release assets
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fc-rootfs-alpine-nginx-${{ env.ALPINE_VERSION }}-${{ env.ARCH }}
          name: Alpine nginx Firecracker rootfs ${{ env.ALPINE_VERSION }} ${{ env.ARCH }}
          body: |
            Raw LatticeVE Firecracker rootfs build.

            Download and upload this file to LatticeVE:

            - `alpine-nginx-${{ env.ALPINE_VERSION }}-${{ env.ARCH }}.ext4`

            Companion files:

            - `alpine-nginx-${{ env.ALPINE_VERSION }}-${{ env.ARCH }}.ext4.sha256`
            - `alpine-nginx-${{ env.ALPINE_VERSION }}-${{ env.ARCH }}.ext4.json`
          files: |
            dist/*.ext4
            dist/*.sha256
            dist/*.json
          overwrite_files: true
